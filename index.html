<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10 Interpretations, One Muse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f4ef;
    --ink: #1a1814;
    --muted: #7a7570;
    --border: #e0dbd4;
    --accent: #c8a97e;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Jost', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── PAGE TRANSITIONS ─── */
  .page {
    position: fixed; inset: 0;
    overflow-y: auto;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
    background: var(--cream);
  }
  .page.active {
    opacity: 1;
    pointer-events: all;
  }

  /* ─── HOMEPAGE ─── */
  #home-page {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .home-header {
    text-align: center;
    padding: 10vh 2rem 6vh;
    border-bottom: 1px solid var(--border);
  }

  .home-header .eyebrow {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .home-header h1 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 1.4rem;
  }

  .home-header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .home-header .tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(0.95rem, 2.2vw, 1.15rem);
    color: var(--muted);
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.65;
  }

  .home-header .divider {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 2rem auto 0;
  }

  /* ─── GALLERY GRID ─── */
  .gallery-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 5vh 2rem 10vh;
  }

  .era-group { margin-bottom: 4rem; }

  .era-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }

  .artists-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 2px;
  }

  .artist-card {
    padding: 1.4rem 1.6rem;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color 0.3s ease, background 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .artist-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 1.6rem; right: 1.6rem;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s ease;
  }

  .artist-card:hover {
    background: #f0ece5;
    border-color: var(--border);
  }

  .artist-card:hover::after {
    transform: scaleX(1);
  }

  .artist-card:hover .card-name {
    color: var(--accent);
  }

  .card-number {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-family: var(--sans);
  }

  .card-name {
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 400;
    letter-spacing: 0.01em;
    transition: color 0.3s ease;
    line-height: 1.3;
  }

  .card-era {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    margin-top: 0.3rem;
    font-family: var(--sans);
  }

  /* ─── ARTIST PAGE ─── */
  #artist-page { min-height: 100vh; }

  .artist-nav {
    padding: 1.8rem 3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .back-btn {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    transition: color 0.2s;
    background: none;
    border: none;
  }

  .back-btn:hover { color: var(--ink); }

  .back-btn .arrow { font-size: 14px; }

  .nav-artist-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.95rem;
    color: var(--muted);
  }

  .artist-body {
    max-width: 980px;
    margin: 0 auto;
    padding: 7vh 3rem 10vh;
  }

  .artist-meta {
    margin-bottom: 5vh;
  }

  .artist-era-tag {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .artist-full-name {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(2.4rem, 5.5vw, 4.2rem);
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .artist-full-name em {
    font-style: italic;
  }

  /* ─── QUOTE SECTION ─── */
  .quote-section {
    margin: 6vh 0;
    padding: 4vh 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .quote-mark {
    font-family: var(--serif);
    font-size: 7rem;
    line-height: 0.6;
    color: var(--accent);
    opacity: 0.35;
    position: absolute;
    top: 3vh;
    left: -1rem;
    pointer-events: none;
    select: none;
  }

  .quote-text {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(1.2rem, 2.5vw, 1.55rem);
    line-height: 1.75;
    font-weight: 300;
    color: var(--ink);
    padding-left: 2rem;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  .quote-attribution {
    margin-top: 1.8rem;
    padding-left: 2rem;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ─── PAINTINGS ─── */
  .paintings-section { margin-top: 6vh; }

  .paintings-heading {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .paintings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.5rem;
  }

  .painting-item { cursor: pointer; }

  .painting-img-wrap {
    aspect-ratio: 3/4;
    overflow: hidden;
    background: #e8e4de;
    position: relative;
  }

  .painting-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.7s ease, filter 0.4s ease;
    filter: saturate(0.9) brightness(0.96);
    display: block;
  }

  .painting-item:hover .painting-img-wrap img {
    transform: scale(1.04);
    filter: saturate(1.05) brightness(1);
  }

  .painting-caption {
    margin-top: 0.75rem;
  }

  .painting-title {
    font-family: var(--serif);
    font-style: italic;
    font-size: 0.9rem;
    line-height: 1.4;
  }

  .painting-year {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-top: 0.2rem;
  }

  /* ─── FOOTER ─── */
  .home-footer {
    text-align: center;
    padding: 3rem 2rem;
    border-top: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ─── LIGHTBOX ─── */
  .lightbox {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(26,24,20,0.92);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    padding: 2rem;
  }

  .lightbox.open { opacity: 1; pointer-events: all; }

  .lightbox img {
    max-width: 80vw;
    max-height: 85vh;
    object-fit: contain;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  .lightbox-close {
    position: absolute; top: 2rem; right: 2rem;
    color: #fff; font-size: 1.5rem;
    cursor: pointer; opacity: 0.6;
    background: none; border: none;
    transition: opacity 0.2s;
    font-family: var(--sans); font-weight: 300;
  }

  .lightbox-close:hover { opacity: 1; }

  .lightbox-caption {
    position: absolute; bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.55);
    font-family: var(--serif); font-style: italic;
    font-size: 0.9rem; text-align: center;
    white-space: nowrap;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 640px) {
    .artist-nav { padding: 1.2rem 1.5rem; }
    .artist-body { padding: 5vh 1.5rem 8vh; }
    .quote-mark { font-size: 5rem; left: -0.5rem; }
    .quote-text { padding-left: 1rem; }
    .quote-attribution { padding-left: 1rem; }
    .paintings-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .home-header { padding: 7vh 1.5rem 4vh; }
    .gallery-container { padding: 3vh 1.5rem 8vh; }
  }

  /* ─── FADE-IN ANIMATION ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fade-up { animation: fadeUp 0.7s ease forwards; opacity: 0; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.22s; }
  .delay-3 { animation-delay: 0.34s; }
  .delay-4 { animation-delay: 0.46s; }
</style>
</head>
<body>

<!-- ═══════════════ HOME PAGE ═══════════════ -->
<div id="home-page" class="page active">
  <div class="home-header">
    <p class="eyebrow">A Digital Exhibition</p>
    <h1>30 Painters,<br><em>One Muse</em></h1>
    <p class="tagline">Thirty voices across five centuries, each quietly undone by the same presence.</p>
    <div class="divider"></div>
  </div>

  <div class="gallery-container" id="gallery-container"></div>

  <div class="home-footer">A curated digital gallery &nbsp;·&nbsp; 2026</div>
</div>

<!-- ═══════════════ ARTIST PAGE ═══════════════ -->
<div id="artist-page" class="page">

      <p class="paintings-heading">Selected Works</p>
      <div class="paintings-grid" id="detail-paintings"></div>
    </div>
  </div>
</div>

<!-- ═══════════════ LIGHTBOX ═══════════════ -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
  <p class="lightbox-caption" id="lightbox-caption"></p>
</div>

const ERAS = ["Renaissance", "Baroque", "Romantic", "Impressionist", "Modern"];

function buildHome() {
  const container = document.getElementById('gallery-container');
  let html = '';
  let counter = 1;
  ERAS.forEach(era => {
    const artists = DATA.filter(d => d.era === era);
    if (!artists.length) return;
    html += `<div class="era-group"><div class="era-label">${era}</div><div class="artists-grid">`;
    artists.forEach(artist => {
      html += `
        <div class="artist-card" onclick="openArtist('${artist.name.replace(/'/g,"\\'")}')">
          <div class="card-number">${String(counter).padStart(2,'0')}</div>
          <div class="card-name">${artist.name}</div>
          <div class="card-era">${artist.era}</div>
        </div>`;
      counter++;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function openArtist(name) {
  const artist = DATA.find(d => d.name === name);
  if (!artist) return;

  document.getElementById('nav-name').textContent = artist.name;
  document.getElementById('detail-era').textContent = artist.era;

  const nameParts = artist.name.split(' ');
  const last = nameParts.pop();
  document.getElementById('detail-name').innerHTML = `${nameParts.join(' ')} <em>${last}</em>`;

  document.getElementById('detail-quote').textContent = artist.quote;
  document.getElementById('detail-attr').textContent = `— ${artist.name}`;

  const paintingsEl = document.getElementById('detail-paintings');
  paintingsEl.innerHTML = artist.paintings.map(p => `
    <div class="painting-item" onclick="openLightbox('${p.url.replace(/'/g,"\\'")}','${p.title.replace(/'/g,"\\'")} · ${p.year}')">
      <div class="painting-img-wrap">
        <img src="${p.url}" alt="${p.title}" loading="lazy" onerror="this.parentElement.style.background='#e8e4de'">
      </div>
      <div class="painting-caption">
        <div class="painting-title">${p.title}</div>
        <div class="painting-year">${p.year}</div>
      </div>
    </div>
  `).join('');

  const artistPage = document.getElementById('artist-page');
  const homePage = document.getElementById('home-page');

  homePage.classList.remove('active');
  setTimeout(() => {
    artistPage.classList.add('active');
    artistPage.scrollTop = 0;
    // re-trigger fade-up animations
    const fadeEls = artistPage.querySelectorAll('.fade-up');
    fadeEls.forEach(el => { el.style.animation = 'none'; el.offsetHeight; el.style.animation = ''; });
  }, 300);
}

function goHome() {
  const artistPage = document.getElementById('artist-page');
  const homePage = document.getElementById('home-page');
  artistPage.classList.remove('active');
  setTimeout(() => {
    homePage.classList.add('active');
  }, 300);
}

function openLightbox(url, caption) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox-caption').textContent = caption;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

buildHome();
</script>
